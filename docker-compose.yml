services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
      POSTGRES_DB: devflow
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devflow
      MINIO_ROOT_PASSWORD: devflow-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # Creates the bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 devflow devflow-secret) do sleep 2; done;
      mc mb -p local/devflow || true;
      mc anonymous set none local/devflow;
      exit 0;
      "

  app:
    build: .
    depends_on:
      db: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://devflow:devflow@db:5432/devflow
      # 시크릿은 .env 파일(.gitignore됨)에서 주입 — 레포에 실값 커밋 금지 (R0-0)
      SESSION_SECRET: ${SESSION_SECRET:?required — .env에 설정하세요 (openssl rand -hex 32)}
      INVITE_TOKEN_SECRET: ${INVITE_TOKEN_SECRET:?required — .env에 설정하세요 (openssl rand -hex 32)}
      API_TOKEN_SECRET: ${API_TOKEN_SECRET:?required — .env에 설정하세요 (openssl rand -hex 32)}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?required — .env에 설정하세요 (openssl rand -hex 32)}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: devflow
      S3_ACCESS_KEY: devflow
      S3_SECRET_KEY: devflow-secret
      S3_FORCE_PATH_STYLE: "true"
      APP_BASE_URL: http://localhost:5000
      # P8: GitHub 웹훅 서명 시크릿 — GitHub 저장소 Webhook 설정에 같은 값을 입력 (.env에서 주입, 선택)
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # P7: LLM/임베딩 — 키를 넣으면 mock 대신 실제 모델 사용 (LLM_PROVIDER: openai|anthropic)
      LLM_PROVIDER: mock
      TZ: Asia/Seoul
    ports: ["5000:5000"]
    command: sh -c "npm run db:push && npm run start"

volumes:
  dbdata:
  miniodata:
